<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Founder OS | System Dashboard</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<!-- Full layout screen with overflow hidden to allow internal scroll containers -->

<body class="bg-black text-gray-200 antialiased h-screen w-full flex overflow-hidden selection:bg-blue-500/30">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-[#222] bg-[#0A0A0A] flex flex-col shrink-0 h-full relative z-20 shadow-2xl">
    <!-- Brand Logo Area -->
    <div class="p-6 border-b border-[#222] flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center shrink-0">
        <svg class="w-5 h-5 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
      </div>
      <div>
        <h1 class="text-white font-outfit font-semibold text-base tracking-tight leading-tight">AI Founder OS</h1>
        <p class="text-[0.65rem] text-gray-500 uppercase tracking-widest font-semibold mt-0.5">Build systems</p>
      </div>
    </div>

    <!-- Navigation List -->
    <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="sidebar-nav">
      <!-- Rendered by JS -->
    </nav>

    <!-- User Profile Action -->
    <div class="p-4 border-t border-[#222] bg-gradient-to-t from-black to-transparent">
      <div
        class="flex items-center gap-3 w-full p-2 rounded-lg hover:bg-[#111] transition-colors cursor-pointer border border-transparent hover:border-[#222] group">
        <div
          class="w-9 h-9 rounded-full bg-blue-600/20 border border-blue-500/30 text-blue-400 flex items-center justify-center font-bold font-outfit shadow-[0_0_10px_rgba(59,130,246,0.1)] group-hover:shadow-[0_0_15px_rgba(59,130,246,0.2)] transition-shadow">
          F
        </div>
        <div class="text-sm flex-1 min-w-0">
          <p class="font-medium text-white truncate">Founder</p>
          <p class="text-[0.7rem] text-gray-500 uppercase tracking-wider">Admin</p>
        </div>
        <i data-lucide="chevrons-up-down" class="w-4 h-4 text-gray-600"></i>
      </div>
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="flex-1 flex flex-col min-w-0 bg-[#000] relative isolate">
    <!-- Glow effect for depth -->
    <div
      class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-500/5 rounded-full blur-[120px] pointer-events-none -z-10">
    </div>

    <!-- Topbar Header -->
    <header
      class="h-16 border-b border-[#222] flex items-center px-8 justify-between shrink-0 sticky top-0 bg-black/80 backdrop-blur-xl z-10 transition-colors">
      <div class="flex items-center gap-4">
        <h2 class="text-base text-white/50 font-medium tracking-wide">AI Founder OS <span
            class="mx-2 text-gray-700">/</span> <span id="page-title" class="text-white">Dashboard</span></h2>
      </div>
      <div class="flex gap-4 items-center">
        <button
          class="w-8 h-8 rounded-md flex items-center justify-center text-gray-400 hover:text-white hover:bg-[#161616] border border-transparent hover:border-[#333] transition-all">
          <i data-lucide="search" class="w-4 h-4"></i>
        </button>
        <button
          class="w-8 h-8 rounded-md flex items-center justify-center text-gray-400 hover:text-white hover:bg-[#161616] border border-transparent hover:border-[#333] transition-all relative">
          <i data-lucide="bell" class="w-4 h-4"></i>
          <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
        </button>
        <div class="w-px h-6 bg-[#222] mx-1"></div>
        <button
          class="bg-white text-black text-sm font-semibold font-outfit px-4 py-1.5 rounded-md hover:bg-gray-200 transition-colors shadow-lg shadow-white/10 flex items-center gap-2">
          <i data-lucide="play" class="fill-black w-3 h-3"></i> Execute Run
        </button>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <div class="flex-1 overflow-y-auto" id="main-scroll">
      <div class="p-8 max-w-5xl mx-auto w-full pb-24" id="content-area">
        <!-- Content injected by main.js -->
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
